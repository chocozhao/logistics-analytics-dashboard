services:
  - type: web
    name: logistics-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    buildContext: ./backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Use Render's connection string format (primary for DatabaseConfig)
      - key: DATABASE_URL
        fromDatabase:
          name: logistics-db
          property: connectionString
      # Also set SPRING_DATASOURCE_URL for application.properties
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: logistics-db
          property: connectionString
      # Individual properties as fallback
      - key: SPRING_DATASOURCE_HOST
        fromDatabase:
          name: logistics-db
          property: host
      - key: SPRING_DATASOURCE_PORT
        fromDatabase:
          name: logistics-db
          property: port
      - key: SPRING_DATASOURCE_DATABASE
        fromDatabase:
          name: logistics-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: logistics-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: logistics-db
          property: password
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://logistics-frontend.onrender.com
    healthCheckPath: /actuator/health
    autoDeploy: true

  - type: web
    name: logistics-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        value: https://logistics-backend.onrender.com/api
    autoDeploy: true

databases:
  - name: logistics-db
    databaseName: logistics
    user: reader
    plan: free
    ipAllowList: []