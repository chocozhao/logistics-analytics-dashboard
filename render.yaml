services:
  - type: web
    name: logistics-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: logistics-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://logistics-frontend.onrender.com
    healthCheckPath: /actuator/health
    autoDeploy: true

  - type: web
    name: logistics-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        value: https://logistics-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true

databases:
  - name: logistics-db
    databaseName: logistics
    user: reader
    plan: free
    ipAllowList: []