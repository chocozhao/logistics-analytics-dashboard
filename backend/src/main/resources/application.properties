# Server Configuration
server.port=8080
spring.application.name=logistics-analytics-dashboard

# Default active profile (can be overridden by SPRING_PROFILES_ACTIVE environment variable)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logistics}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:reader}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:readonly}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
# SQL initialization (disabled - using DataInitializer)
spring.sql.init.mode=never

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY:}
openai.api.model=gpt-3.5-turbo
openai.api.temperature=0.1
openai.api.max-tokens=1000

# Logging
logging.level.com.logistics.dashboard=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# CORS Configuration for frontend development
# Can be overridden by environment variable CORS_ALLOWED_ORIGINS
# In production, set to frontend URL (e.g., https://logistics-frontend.onrender.com)
cors.allowed-origins=http://localhost:3000,http://localhost:5173