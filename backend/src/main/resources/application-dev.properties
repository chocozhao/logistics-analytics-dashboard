# Development Configuration with Render PostgreSQL production database
spring.datasource.url=jdbc:postgresql://dpg-d7akjt1r0fns73fi73ug-a.oregon-postgres.render.com:5432/logistics_db_sqox?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=logistics_db_sqox_user
spring.datasource.password=HKicoUgXjRQLKkdZR24KoIHXoiaAH2rZ
# Connection pool configuration (same as production)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration for PostgreSQL (aligned with production)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
# Additional JPA optimizations (same as production)
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
# SQL initialization (disabled - using JPA ddl-auto=validate and DataInitializer)
spring.sql.init.mode=never
