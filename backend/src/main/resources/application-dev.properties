# Development Configuration with H2 Database
spring.datasource.url=jdbc:h2:mem:logisticsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
# SQL initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# OpenAI Configuration (needs to be set via environment variable)
openai.api.key=${OPENAI_API_KEY:test-key-for-dev}
openai.api.model=gpt-3.5-turbo
openai.api.temperature=0.1
openai.api.max-tokens=1000

# Logging
logging.level.com.logistics.dashboard=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE