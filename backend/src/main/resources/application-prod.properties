# Production configuration for Render.com deployment

# Server Configuration
server.port=${PORT:8080}
spring.application.name=logistics-analytics-dashboard

# Database Configuration for Render PostgreSQL
# DatabaseConfig.java handles the connection logic for different Render environments
# Keep these as fallbacks, but DatabaseConfig will override based on environment variables

# Basic configuration (fallback values)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Default values (used only if not provided by environment variables)
spring.datasource.url=jdbc:postgresql://localhost:5432/logistics
spring.datasource.username=reader
spring.datasource.password=readonly

# JPA Configuration for production
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true

# OpenAI Configuration (optional - for NLQ functionality)
# If OPENAI_API_KEY is not set, NLQ will return placeholder responses
openai.api.key=${OPENAI_API_KEY:}
openai.api.model=gpt-3.5-turbo
openai.api.temperature=0.1
openai.api.max-tokens=1000

# CORS configuration for production
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://logistics-frontend.onrender.com}

# Logging configuration for production
logging.level.com.logistics=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Health check configuration
management.endpoint.health.show-details=when_authorized
management.endpoints.web.exposure.include=health,info
management.health.db.enabled=true
management.health.diskspace.enabled=true

# Actuator security
management.endpoints.web.base-path=/actuator
management.endpoints.web.path-mapping.health=health

# Security headers (handled by Render.com infrastructure)
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=2048

# SQL initialization for production database
spring.sql.init.mode=always
spring.sql.init.platform=postgresql
# Disable generic schema.sql/data.sql for PostgreSQL
spring.sql.init.schema-locations=classpath:schema-postgresql.sql
spring.sql.init.data-locations=classpath:data-postgresql.sql