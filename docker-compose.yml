version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: logistics
      POSTGRES_USER: reader
      POSTGRES_PASSWORD: readonly
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/sample-data.sql:/docker-entrypoint-initdb.d/sample-data.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reader -d logistics"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/logistics
      SPRING_DATASOURCE_USERNAME: reader
      SPRING_DATASOURCE_PASSWORD: readonly
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080/api

volumes:
  pgdata: